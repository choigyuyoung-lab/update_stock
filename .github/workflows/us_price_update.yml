name: US Stock Price Update

on:
  repository_dispatch:
    types: [us_update]
  workflow_dispatch:

jobs:
  update-us:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 경고 제거

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Upgrade pip & Install dependencies
        run: |
          python -m pip install --upgrade pip
          # fast_info의 성능을 극대화하기 위해 lxml 추가 설치
          pip install "notion-client==2.2.1" "yfinance>=0.2.31" "lxml"
          
      - name: Run US Price Update
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: python update_price_us.py
