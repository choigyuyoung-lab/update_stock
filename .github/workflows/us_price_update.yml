name: US Stock Price Update

on:
  repository_dispatch:
    types: [us_update]
  workflow_dispatch:

jobs:
  update-us:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 경고 제거

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 🌟 캐시를 활성화하여 패키지 설치 시간을 단축합니다.
          
      # 🌟 이 부분을 수정했습니다: 수동 개별 설치 대신txt 목록 기반으로 안전하게 통합 설치합니다.
      - name: Upgrade pip & Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run US Price Update
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: python update_price_us.py