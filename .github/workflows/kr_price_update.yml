name: KR Stock Price Update

on:
  # 🌟 cron-job.org와 같은 외부 서비스에서 호출할 때 사용
  repository_dispatch:
    types: [kr_update]
  # 🌟 필요할 때 버튼을 눌러 직접 실행할 때 사용
  workflow_dispatch:

jobs:
  update-kr:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 경고 제거

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "notion-client==2.2.1" "requests"

      - name: Run KR Price Update
        env:
          # 노션 연결 정보
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          
          # 한국투자증권 API 정보 (Secrets에 등록된 이름과 일치해야 함)
          KIS_VTS_APP_KEY: ${{ secrets.KIS_VTS_APP_KEY }}
          KIS_VTS_APP_SECRET: ${{ secrets.KIS_VTS_APP_SECRET }}
          
        run: python update_price_kr.py
