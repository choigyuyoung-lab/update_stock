name: KR Stock Price Update

on:
  repository_dispatch:
    types: [kr_update] # cron-job.org에서 이 이름으로 신호를 보낼 거예요
  workflow_dispatch:

jobs:
  update-kr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Upgrade pip & Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "notion-client==2.2.1" "requests" "beautifulsoup4"
      - name: Run KR Price Update
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: python update_price_kr.py
