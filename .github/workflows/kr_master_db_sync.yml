name: KR Master DB Sync

on:
  repository_dispatch:
    types: [kr_master_sync]
  workflow_dispatch: # 수동 실행 시 전 종목 업데이트 모드로 작동

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # KIS API 및 Notion API 처리에 필요한 핵심 라이브러리만 설치
        pip install notion-client==2.2.1 requests pandas httpx

    - name: Run KR Update
      env:
        # 1. 노션 관련 설정
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        MASTER_DATABASE_ID: ${{ secrets.MASTER_DATABASE_ID }}
        BENCHMARK_DATABASE_ID: ${{ secrets.BENCHMARK_DATABASE_ID }}
        
        # 2. 🌟 한국투자증권 API 인증 정보 (신규 추가)
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        
        # 3. 🌟 수동 실행 여부 전달 (전 종목 업데이트 로직용)
        # 이 변수가 'true'로 전달되어야 파이썬 코드에서 필터 없이 전체를 훑습니다.
        IS_FULL_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        
      run: python update_master_db_kr.py
