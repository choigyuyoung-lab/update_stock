name: KR Master DB Sync

on:
  repository_dispatch:
    types: [kr_master_sync]
  workflow_dispatch: # 👈 Run workflow 버튼을 직접 누를 때 전체 업데이트가 작동합니다.

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # KIS API 및 pykrx 비동기 처리에 필요한 핵심 라이브러리만 깔끔하게 설치
        pip install notion-client==2.2.1 requests pandas pykrx httpx lxml

    - name: Run KR Update
      env:
        # 1. 노션 연결 정보 (Secrets 이름과 파이썬 변수명을 정확히 매핑)
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        MASTER_DATABASE_ID: ${{ secrets.MASTER_DATABASE_ID }}
        BENCHMARK_DATABASE_ID: ${{ secrets.BENCHMARK_DATABASE_ID }}
        
        # 2. 🌟 KIS API 인증키 (새로 추가됨)
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        
        # 3. 🌟 KRX 로그인 인증 (IP 차단 방지 및 데이터 정상 파싱을 위해 유지 필수)
        KRX_ID: ${{ secrets.KRX_ID }}
        KRX_PW: ${{ secrets.KRX_PW }}
        
        # 4. 전체 업데이트 여부 판단 (수동 실행 시 true 전달)
        IS_FULL_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        
      run: python update_master_db_kr.py
