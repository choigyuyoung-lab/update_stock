name: KR Master DB Sync

on:
  repository_dispatch:
    types: [kr_master_sync]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # KIS API 및 pykrx 비동기 처리에 최적화된 라이브러리 구성
        pip install notion-client==2.2.1 requests pandas pykrx httpx lxml

    - name: Run KR Update
      env:
        # 🌟 노션 연결 정보 (Secrets 이름과 완벽 매칭 및 안전장치)
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        MASTER_DATABASE_ID: ${{ secrets.DATABASE_ID }}
        DATABASE_ID: ${{ secrets.DATABASE_ID }}
        BENCHMARK_DATABASE_ID: ${{ secrets.BENCHMARK_DATABASE_ID }}
        INDEX_DATABASE_ID: ${{ secrets.BENCHMARK_DATABASE_ID }}
        
        # 🌟 KIS API 인증키
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        
        # 🌟 KRX 로그인 인증 (IP 차단 우회용 필수 복구!)
        KRX_ID: ${{ secrets.KRX_ID }}
        KRX_PW: ${{ secrets.KRX_PW }}
        
        IS_FULL_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      run: python update_master_db_kr.py
