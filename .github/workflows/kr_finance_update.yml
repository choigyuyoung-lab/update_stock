name: KR Stock Finance Update

on:
  # 🌟 cron-job.org 등에서 호출할 때 사용 (이벤트 타입: kr_finance_update)
  repository_dispatch:
    types: [kr_finance_update]
  # 🌟 버튼을 눌러 직접 실행할 때 사용
  workflow_dispatch:

jobs:
  update-finance:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 관련 경고 방지

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "notion-client==2.2.1" "requests"

      - name: Run KR Finance Update
        env:
          # 노션 연결 정보
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          
          # 🌟 사용자님의 GitHub Secrets 이름과 일치시켰습니다.
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          
        run: python update_finance_kr.py