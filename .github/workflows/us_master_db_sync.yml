name: US/Global Master DB Sync

on:
  repository_dispatch:
    types: [us_master_sync]
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 경고 제거
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 필요한 모든 라이브러리 설치 (lxml은 속도 향상에 필수)
        pip install notion-client pandas finance-datareader yfinance httpx lxml
        pip install notion-client==2.2.1 requests beautifulsoup4 pandas finance-datareader lxml yfinance>=0.2.31
    - name: Run US Update
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        MASTER_DATABASE_ID: ${{ secrets.MASTER_DATABASE_ID }}
        BENCHMARK_DATABASE_ID: ${{ secrets.BENCHMARK_DATABASE_ID }}
        IS_FULL_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      run: python update_master_db_us.py

