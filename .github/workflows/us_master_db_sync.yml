name: US/Global Master DB Sync

on:
  repository_dispatch:
    types: [us_master_sync]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      # 해외 주식에 필요한 yfinance 추가 (무거운 pykrx 제거)
      run: |
        python -m pip install --upgrade pip
        pip install notion-client==2.2.1 requests beautifulsoup4 pandas finance-datareader lxml yfinance>=0.2.31
    - name: Run US Update
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        MASTER_DATABASE_ID: ${{ secrets.MASTER_DATABASE_ID }}
        IS_FULL_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      run: python update_master_db_us.py
