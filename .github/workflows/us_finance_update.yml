name: US Finance Update

on:
  repository_dispatch:
    types: [us_finance]
  workflow_dispatch:

jobs:
  update-us-finance:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 경고 제거

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 🌟requirements.txt가 준비되었으므로 캐시를 활성화하여 속도를 올립니다.

      # 🌟 이 부분을 수정했습니다: 개별 나열 대신 txt 목록으로 안전하게 일괄 설치합니다.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run US Finance Update
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: python update_finance_us.py