name: Stock Master DB Automation

on:
  repository_dispatch:
    types: [master_db_sync]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # 사용자 요청에 따른 파이썬 3.10 고정 및 Node.js 24 호환 버전
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # AttributeError 방지를 위해 기존의 잘못된 패키지 삭제
        pip uninstall notion -y 
        # 공식 SDK 및 크롤링/데이터 분석 필수 라이브러리 설치
        pip install notion-client==2.2.1 requests beautifulsoup4 pandas finance-datareader pykrx==1.0.46 lxml

    - name: Run Update Script
      env:
        # 깃허브 Secrets 환경 변수
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        MASTER_DATABASE_ID: ${{ secrets.MASTER_DATABASE_ID }}
        # 수동 버튼 실행(workflow_dispatch) 시에만 전체 업데이트 수행
        IS_FULL_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      run: python update_master_db.py
