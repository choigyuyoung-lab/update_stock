name: Stock Master DB Automation

：:
  repository_dispatch:
    types: [master_db_sync]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip uninstall notion -y 
        pip install notion-client==2.2.1 requests beautifulsoup4 pandas finance-datareader pykrx lxml

    - name: Run Update Script
      env:
        # 노션 연결 정보
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        MASTER_DATABASE_ID: ${{ secrets.MASTER_DATABASE_ID }}
        
        # KRX 로그인 정보 (GitHub Secrets에 등록된 값 호출)
        KRX_ID: ${{ secrets.KRX_ID }}
        KRX_PW: ${{ secrets.KRX_PW }}
        
        # 업데이트 모드 설정
        IS_FULL_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      run: python update_master_db.py
